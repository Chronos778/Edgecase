version: '3.8'

services:
  # PostgreSQL - Primary data storage
  postgres:
    image: postgres:16-alpine
    container_name: edgecase_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edgecase
      POSTGRES_USER: edgecase
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edgecase_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgecase -d edgecase"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j - Graph database for supply chain relationships
  neo4j:
    image: neo4j:5.15-community
    container_name: edgecase_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-edgecase_secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-edgecase_secret}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector database for RAG embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: edgecase_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

networks:
  default:
    name: edgecase_network
